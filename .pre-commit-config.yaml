# Git pre-commit hooks. Setup:
#   pip install pre-commit
#   pre-commit install              # run automatically on `git commit`
#   pre-commit run --all-files      # run over the whole tree once
#
# Hooks reuse the in-repo configs: clang-format -> .clang-format,
# cmake-format/cmake-lint -> .cmake-format.yaml.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-yaml
      - id: check-json
        # .vscode/*.json are JSONC (comments) — skip the strict JSON parser there.
        exclude: ^\.vscode/
      - id: check-merge-conflict

  # C / C++ formatting — pin to your toolchain (LLVM 20.x).
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v20.1.8
    hooks:
      - id: clang-format
        types_or: [c++, c]

  # CMake formatting + linting (honors .cmake-format.yaml).
  - repo: https://github.com/cheshirekow/cmake-format-precommit
    rev: v0.6.13
    hooks:
      - id: cmake-format
        additional_dependencies: [pyyaml]
      - id: cmake-lint
        additional_dependencies: [pyyaml]
