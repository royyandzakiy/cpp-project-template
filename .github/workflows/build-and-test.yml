name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - clang-linux-debug
          - clang-linux-release
          - gcc-linux-debug
          - gcc-linux-release
    steps:
      # submodules: cmake-conan provider lives in cmake/cmake-conan (PKG_MANAGER defaults to conan).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build gcc g++ clang lld \
            pkg-config git curl zip unzip tar python3 python3-pip pipx

      - name: Install Conan
        run: |
          pipx install conan
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Conan default profile
        run: conan profile detect --force

      # Cache the Conan package cache so deps (fmt/scnlib/tracy) aren't rebuilt every run.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.preset }}-
            conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # NOTE: we run ctest, not the app — src/main.cpp has an intentional `while(true)` loop
      # that would hang CI. ctest only runs the unit_tests target.
      - name: Test
        run: ctest --preset test-${{ matrix.preset }}
