name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; only the publish-badges job below elevates to contents: write
# (to push the badges branch via the built-in GITHUB_TOKEN — no PAT / external account needed).
permissions:
  contents: read

jobs:
  linux:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Each matrix leg shows as its own named check in the Actions UI, so per-preset pass/fail
        # is visible natively (no extra dashboard needed). Windows/macOS presets come later.
        preset:
          - clang-linux-debug # coverage runs here only (same suite ⇒ identical coverage elsewhere)
          - clang-linux-release
          - gcc-linux-debug
          - gcc-linux-release
          - clang-linux-asan # UBSan + ASan + LSan; the sanitizer_tests trip-wires prove it's live
          - clang-linux-tsan # UBSan + TSan
          - clang-linux-full # ASan + strict + tidy + pch + unity + examples
    steps:
      # submodules: the cmake-conan provider lives in cmake/cmake-conan (used when PKG_MANAGER=conan).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Single source of truth: the SAME script the devcontainer and WSL use. It pins Clang
      # (apt.llvm.org) and installs Conan, so CI can't drift from local toolchains.
      - name: Install toolchain (pinned) + Conan
        run: bash scripts/setup-ubuntu.sh

      - name: Put Conan (pipx) on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Conan default profile
        run: conan profile detect --force

      # Cache the Conan package cache so deps (fmt/scnlib/tracy) aren't rebuilt every run.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.preset }}-
            conan-${{ runner.os }}-

      # PKG_MANAGER=conan: local_options.cmake (which selects conan) is gitignored, and the
      # presets default to vcpkg — so CI must select the provider it actually provisions above.
      # BUILD_TESTING=ON so the ctest step has tests (sanitizer presets already set it).
      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -D PKG_MANAGER=conan -D BUILD_TESTING=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # NOTE: we run ctest, not the app — src/main.cpp has an intentional `while(true)` loop
      # that would hang CI. For sanitizer presets ctest also runs the trip-wires that prove each
      # sanitizer actually catches its bug class (a silently-off sanitizer would fail them).
      - name: Test
        run: ctest --preset test-${{ matrix.preset }}

      # Coverage: clang-linux-debug sets ENABLE_COVERAGE=ON, so the `coverage` target exists.
      # It re-runs the tests under LLVM instrumentation and writes build/<preset>/coverage-html/.
      # Guarded by preset name so other (non-coverage) presets in the matrix don't break.
      - name: Coverage report
        if: matrix.preset == 'clang-linux-debug'
        run: cmake --build --preset ${{ matrix.preset }} --target coverage

      # Render the coverage table straight onto the Actions run page (no need to open the artifact).
      # The `coverage` target wrote build/<preset>/coverage.lcov; cov-to-md.py turns it into Markdown.
      - name: Coverage job summary
        if: matrix.preset == 'clang-linux-debug'
        run: |
          {
            echo "## Coverage — ${{ matrix.preset }} (Clang)"
            echo ""
            python3 scripts/cov-to-md.py "build/${{ matrix.preset }}/coverage.lcov"
          } >> "$GITHUB_STEP_SUMMARY"

      # Stage shields.io endpoint JSONs as artifacts (no pushing here — see the publish-badges job).
      # Compiler/version come from build/<preset>/toolchain.txt (written by cmake/compiler.cmake),
      # so the badge can never drift from what actually built. The clang leg also owns coverage + OS.
      - name: Stage badges (clang)
        if: matrix.preset == 'clang-linux-debug'
        run: |
          mkdir -p badges-out
          python3 scripts/cov-to-md.py --shields "build/${{ matrix.preset }}/coverage.lcov" > badges-out/coverage.json
          python3 scripts/make-badge.py --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/clang.json
          . /etc/os-release
          python3 scripts/make-badge.py --label "tested on" --message "$NAME $VERSION_ID" --color E95420 --logo ubuntu > badges-out/os.json
      - name: Stage badges (gcc)
        if: matrix.preset == 'gcc-linux-debug'
        run: |
          mkdir -p badges-out
          python3 scripts/make-badge.py --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/gcc.json
      - name: Upload staged badges
        if: matrix.preset == 'clang-linux-debug' || matrix.preset == 'gcc-linux-debug'
        uses: actions/upload-artifact@v4
        with:
          name: badges-${{ matrix.preset }}
          path: badges-out
          if-no-files-found: error

      - name: Upload coverage HTML
        if: matrix.preset == 'clang-linux-debug'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/coverage-html
          if-no-files-found: error

  # Single writer: collect every leg's staged badge JSONs and commit them to the orphan `badges`
  # branch in ONE push (no inter-job race). Runs only when the whole matrix passed (needs: linux)
  # and only on push to main/master (PRs/forks can't push). The push does NOT retrigger CI
  # ([skip ci] + the branch isn't a trigger). New badges (Windows compilers, fuzz stats, ...) just
  # need another leg to stage a *.json artifact — this job picks them up automatically.
  publish-badges:
    needs: linux
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - name: Download staged badges
        uses: actions/download-artifact@v4
        with:
          pattern: badges-*
          path: badges-in
          merge-multiple: true
      - name: Commit to badges branch
        env:
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          work="$(mktemp -d)"
          if git clone --depth=1 --branch badges "$REPO_URL" "$work" 2>/dev/null; then
            cd "$work"
          else
            # First run: branch doesn't exist yet — start a clean orphan history.
            cd "$work"
            git init -q
            git remote add origin "$REPO_URL"
            git checkout -q --orphan badges
            git rm -rqf . 2>/dev/null || true
          fi
          cp "$GITHUB_WORKSPACE"/badges-in/*.json .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./*.json
          git commit -q -m "ci: update badges [skip ci]" || { echo "badges unchanged"; exit 0; }
          git push -q origin badges
