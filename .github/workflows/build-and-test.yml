name: CI

on:
  push:
    branches: [main, master, develop, feat/github-actions-windows-ci]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege by default; only the publish-badges job below elevates to contents: write
permissions:
  contents: read

jobs:
  linux:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - clang-linux-debug
          - clang-linux-release
          - gcc-linux-debug
          - gcc-linux-release
          - clang-linux-asan
          - clang-linux-tsan
          - clang-linux-full
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain (pinned) + Conan + VCPKG
        run: bash scripts/setup-ubuntu.sh --with-vcpkg

      - name: Put Conan (pipx) on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Conan default profile
        run: conan profile detect --force

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.preset }}-
            conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -D PKG_MANAGER=vcpkg -D BUILD_TESTING=ON
        env:
          VCPKG_ROOT: ${{ runner.home }}/vcpkg

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset test-${{ matrix.preset }}

      - name: Coverage report
        if: matrix.preset == 'clang-linux-debug'
        run: cmake --build --preset ${{ matrix.preset }} --target coverage

      - name: Coverage job summary
        if: matrix.preset == 'clang-linux-debug'
        run: |
          {
            echo "## Coverage — ${{ matrix.preset }} (Clang)"
            echo ""
            python3 scripts/cov-to-md.py "build/${{ matrix.preset }}/coverage.lcov"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Stage badges (clang)
        if: matrix.preset == 'clang-linux-debug'
        run: |
          mkdir -p badges-out
          python3 scripts/cov-to-md.py --shields "build/${{ matrix.preset }}/coverage.lcov" > badges-out/coverage.json
          python3 scripts/make-badge.py --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/clang.json
          . /etc/os-release
          python3 scripts/make-badge.py --label "tested on" --message "$NAME $VERSION_ID" --color E95420 --logo ubuntu > badges-out/os-linux.json
      - name: Stage badges (gcc)
        if: matrix.preset == 'gcc-linux-debug'
        run: |
          mkdir -p badges-out
          python3 scripts/make-badge.py --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/gcc.json
      - name: Upload staged badges
        if: matrix.preset == 'clang-linux-debug' || matrix.preset == 'gcc-linux-debug'
        uses: actions/upload-artifact@v4
        with:
          name: badges-${{ matrix.preset }}
          path: badges-out
          if-no-files-found: error

      - name: Upload coverage HTML
        if: matrix.preset == 'clang-linux-debug'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/coverage-html
          if-no-files-found: error

  windows:
    name: ${{ matrix.preset }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - msvc-debug
          - msvc-release
          #- msvc-asan
          - clang-cl-debug
          - clang-cl-release
          #- clang-cl-asan
          - mingw-debug
          - mingw-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Setup MSVC environment
      - name: Add MSVC to PATH
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Install vcpkg
      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git
          .\vcpkg\bootstrap-vcpkg.bat
          echo "VCPKG_ROOT=$env:GITHUB_WORKSPACE\vcpkg" >> $env:GITHUB_ENV
          echo "$env:GITHUB_WORKSPACE\vcpkg" >> $env:GITHUB_PATH

      # Cache vcpkg packages
      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/vcpkg
            !${{ github.workspace }}/vcpkg/.git
          key: vcpkg-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.preset }}-
            vcpkg-${{ runner.os }}-

      # For MSVC presets (using vcpkg by default)
      - name: Configure (MSVC)
        if: contains(matrix.preset, 'msvc') || contains(matrix.preset, 'clang-cl')
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --preset ${{ matrix.preset }} -D BUILD_TESTING=ON -D PKG_MANAGER=vcpkg

      # For MinGW presets (using vcpkg)
      - name: Configure (MinGW)
        if: contains(matrix.preset, 'mingw')
        run: cmake --preset ${{ matrix.preset }} -D BUILD_TESTING=ON -D PKG_MANAGER=vcpkg
        env:
          CMAKE_GENERATOR: Ninja

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset test-${{ matrix.preset }}

      # Stage badges for Windows compilers — versioned via --from-toolchain
      - name: Stage badges (MSVC)
        if: contains(matrix.preset, 'msvc-debug') && !contains(matrix.preset, 'asan')
        run: |
          New-Item -ItemType Directory -Force -Path badges-out
          python scripts/make-badge.py --label "MSVC" --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/msvc.json
        shell: pwsh

      - name: Stage badges (Clang-CL)
        if: contains(matrix.preset, 'clang-cl-debug') && !contains(matrix.preset, 'asan')
        run: |
          New-Item -ItemType Directory -Force -Path badges-out
          python scripts/make-badge.py --label "Clang-CL" --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/clang-cl.json
        shell: pwsh

      - name: Stage badges (MinGW)
        if: contains(matrix.preset, 'mingw-debug')
        run: |
          New-Item -ItemType Directory -Force -Path badges-out
          python scripts/make-badge.py --label "MinGW" --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/mingw.json
        shell: pwsh

      - name: Stage badges (OS)
        if: contains(matrix.preset, 'msvc-debug') && !contains(matrix.preset, 'asan')
        run: |
          New-Item -ItemType Directory -Force -Path badges-out
          $os = (Get-CimInstance Win32_OperatingSystem).Caption -replace "Microsoft ", ""
          python scripts/make-badge.py --label "tested on" --message $os --color 0078D6 --logo windows > badges-out/os-windows.json
        shell: pwsh

      - name: Upload Windows badges
        if: contains(matrix.preset, 'debug') && !contains(matrix.preset, 'asan')
        uses: actions/upload-artifact@v4
        with:
          name: badges-${{ matrix.preset }}
          path: badges-out
          if-no-files-found: error

      - name: Upload test results (optional)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/Testing/Temporary
          if-no-files-found: ignore

  macos:
    name: ${{ matrix.preset }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - appleclang-debug
          - appleclang-release
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          brew install cmake ninja conan
          conan profile detect --force

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
          echo "$HOME/vcpkg" >> "$GITHUB_PATH"

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.home }}/vcpkg
            !${{ runner.home }}/vcpkg/.git
          key: vcpkg-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('vcpkg.json') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.preset }}-
            vcpkg-${{ runner.os }}-

      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.preset }}-
            conan-${{ runner.os }}-

      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -D PKG_MANAGER=vcpkg -D BUILD_TESTING=ON
        env:
          VCPKG_ROOT: ${{ runner.home }}/vcpkg

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset test-${{ matrix.preset }}

      - name: Stage badges (AppleClang)
        if: matrix.preset == 'appleclang-debug'
        run: |
          mkdir -p badges-out
          python3 scripts/make-badge.py --from-toolchain "build/${{ matrix.preset }}/toolchain.txt" > badges-out/appleclang.json

      - name: Stage badges (OS)
        if: matrix.preset == 'appleclang-debug'
        run: |
          mkdir -p badges-out
          python3 scripts/make-badge.py --label "tested on" --message "macOS $(sw_vers -productVersion)" --color 999999 --logo apple > badges-out/os-macos.json

      - name: Upload Apple badges
        if: matrix.preset == 'appleclang-debug'
        uses: actions/upload-artifact@v4
        with:
          name: badges-${{ matrix.preset }}
          path: badges-out
          if-no-files-found: error

  # Single writer: collect every leg's staged badge JSONs and commit them to the orphan `badges` branch
  publish-badges:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - name: Download staged badges
        uses: actions/download-artifact@v4
        with:
          pattern: badges-*
          path: badges-in
          merge-multiple: true
      - name: Commit to badges branch
        env:
          REPO_URL: https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        run: |
          work="$(mktemp -d)"
          if git clone --depth=1 --branch badges "$REPO_URL" "$work" 2>/dev/null; then
            cd "$work"
          else
            cd "$work"
            git init -q
            git remote add origin "$REPO_URL"
            git checkout -q --orphan badges
            git rm -rqf . 2>/dev/null || true
          fi
          cp "$GITHUB_WORKSPACE"/badges-in/*.json .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./*.json
          git commit -q -m "ci: update badges [skip ci]" || { echo "badges unchanged"; exit 0; }
          git push -q origin badges
