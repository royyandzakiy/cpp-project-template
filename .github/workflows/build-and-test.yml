name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Start with one known-good preset; add more (release / gcc / sanitizers) back here later.
        preset:
          - clang-linux-debug
    steps:
      # submodules: the cmake-conan provider lives in cmake/cmake-conan (used when PKG_MANAGER=conan).
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Single source of truth: the SAME script the devcontainer and WSL use. It pins Clang
      # (apt.llvm.org) and installs Conan, so CI can't drift from local toolchains.
      - name: Install toolchain (pinned) + Conan
        run: bash scripts/setup-ubuntu.sh

      - name: Put Conan (pipx) on PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Conan default profile
        run: conan profile detect --force

      # Cache the Conan package cache so deps (fmt/scnlib/tracy) aren't rebuilt every run.
      - name: Cache Conan packages
        uses: actions/cache@v4
        with:
          path: ~/.conan2
          key: conan-${{ runner.os }}-${{ matrix.preset }}-${{ hashFiles('conanfile.txt') }}
          restore-keys: |
            conan-${{ runner.os }}-${{ matrix.preset }}-
            conan-${{ runner.os }}-

      # PKG_MANAGER=conan: local_options.cmake (which selects conan) is gitignored, and the
      # presets default to vcpkg — so CI must select the provider it actually provisions above.
      # BUILD_TESTING=ON so the ctest step below has tests to run.
      - name: Configure
        run: cmake --preset ${{ matrix.preset }} -D PKG_MANAGER=conan -D BUILD_TESTING=ON

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # NOTE: we run ctest, not the app — src/main.cpp has an intentional `while(true)` loop
      # that would hang CI. ctest only runs the unit_tests target.
      - name: Test
        run: ctest --preset test-${{ matrix.preset }}

      # Coverage: clang-linux-debug sets ENABLE_COVERAGE=ON, so the `coverage` target exists.
      # It re-runs the tests under LLVM instrumentation and writes build/<preset>/coverage-html/.
      # Guarded by preset name so other (non-coverage) presets added to the matrix don't break.
      - name: Coverage report
        if: matrix.preset == 'clang-linux-debug'
        run: cmake --build --preset ${{ matrix.preset }} --target coverage

      # Render the coverage table straight onto the Actions run page (no need to open the artifact).
      # The `coverage` target wrote build/<preset>/coverage.lcov; cov-to-md.py turns it into Markdown.
      - name: Coverage job summary
        if: matrix.preset == 'clang-linux-debug'
        run: |
          {
            echo "## Coverage — ${{ matrix.preset }} (Clang)"
            echo ""
            python3 scripts/cov-to-md.py "build/${{ matrix.preset }}/coverage.lcov"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage HTML
        if: matrix.preset == 'clang-linux-debug'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/coverage-html
          if-no-files-found: error
