# .github/workflows/build-and-test.yml
name: CI

on:
  push:
    branches: [main, master, develop, feat/github-actions-windows-ci]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  linux:
    name: ${{ matrix.preset }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [clang-linux-debug, clang-linux-release, gcc-linux-debug, gcc-linux-release, clang-linux-asan, clang-linux-tsan, clang-linux-full]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install toolchain + vcpkg
        run: bash scripts/setup-ubuntu.sh --with-vcpkg

      - uses: ./.github/actions/setup-vcpkg
        with: { os: linux }

      - uses: ./.github/actions/cmake-build-test
        with:
          preset: ${{ matrix.preset }}
          cmake-args: -D PKG_MANAGER=vcpkg -D BUILD_TESTING=ON
          retry: true

      - uses: ./.github/actions/stage-badges
        with:
          preset: ${{ matrix.preset }}
          badges: |
            - { label: "Clang", file: "clang.json", condition: "clang-linux-debug" }
            - { label: "GCC", file: "gcc.json", condition: "gcc-linux-debug" }
            - { label: "tested on", file: "os-linux.json", message: "$NAME $VERSION_ID", color: "E95420", logo: "ubuntu", condition: "clang-linux-debug" }
          coverage-preset: clang-linux-debug

  windows:
    name: ${{ matrix.preset }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [msvc-debug, msvc-release, clang-cl-debug, clang-cl-release, mingw-debug, mingw-release]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - uses: ilammy/msvc-dev-cmd@v1
        with: { arch: x64 }

      - uses: ./.github/actions/setup-vcpkg
        with: { os: windows }

      - uses: ./.github/actions/cmake-build-test
        with:
          preset: ${{ matrix.preset }}
          cmake-args: -D BUILD_TESTING=ON -D PKG_MANAGER=vcpkg
          msvc-vcvars: true

      - uses: ./.github/actions/stage-badges
        with:
          preset: ${{ matrix.preset }}
          badges: |
            - { label: "MSVC", file: "msvc.json", condition: "msvc-debug" }
            - { label: "Clang-CL", file: "clang-cl.json", condition: "clang-cl-debug" }
            - { label: "MinGW", file: "mingw.json", condition: "mingw-debug" }
            - { label: "tested on", file: "os-windows.json", message: "$(Get-CimInstance Win32_OperatingSystem).Caption", color: "0078D6", logo: "windows", condition: "msvc-debug" }

  macos:
    name: ${{ matrix.preset }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        preset: [appleclang-debug, appleclang-release]
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - run: brew install cmake ninja

      - uses: ./.github/actions/setup-vcpkg
        with: { os: macos }

      - uses: ./.github/actions/cmake-build-test
        with:
          preset: ${{ matrix.preset }}
          cmake-args: -D PKG_MANAGER=vcpkg -D BUILD_TESTING=ON

      - uses: ./.github/actions/stage-badges
        with:
          preset: ${{ matrix.preset }}
          badges: |
            - { label: "AppleClang", file: "appleclang.json", condition: "appleclang-debug" }
            - { label: "tested on", file: "os-macos.json", message: "macOS $(sw_vers -productVersion)", color: "999999", logo: "apple", condition: "appleclang-debug" }

  publish-badges:
    needs: [linux, windows, macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: badges-*, path: badges-in, merge-multiple: true }
      - run: |
          work="$(mktemp -d)"
          if git clone --depth=1 --branch badges "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" "$work" 2>/dev/null; then
            cd "$work"
          else
            cd "$work"
            git init -q && git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
            git checkout -q --orphan badges && git rm -rqf . 2>/dev/null || true
          fi
          cp "$GITHUB_WORKSPACE"/badges-in/*.json .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ./*.json
          git commit -q -m "ci: update badges [skip ci]" || { echo "badges unchanged"; exit 0; }
          git push -q origin badges
