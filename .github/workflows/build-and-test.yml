name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build with ${{ matrix.compiler.name }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler:
          - { name: GCC,   pkg: g++-13,     cmd: g++-13,      version: "13" }
          - { name: Clang, pkg: clang-17,   cmd: clang++-17,  version: "17" }
      fail-fast: false
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Install ${{ matrix.compiler.name }}
      run: |
        sudo apt-get update
        sudo apt-get install -y ${{ matrix.compiler.pkg }} cmake ninja-build
    
    - name: Configure CMake
      run: |
        cmake -B build/${{ matrix.compiler.name | lower }} \
          -G Ninja \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cmd }} \
          -DCMAKE_CXX_STANDARD=23 \
          -DCMAKE_BUILD_TYPE=Debug \
          -DENABLE_SANITIZERS=OFF \
          -DCMAKE_TOOLCHAIN_FILE="" \
          -DVCPKG_ROOT_PATH="" \
          -DVCPKG_TARGET_TRIPLET=""
    
    - name: Build
      run: cmake --build build/${{ matrix.compiler.name | lower }}
    
    - name: Run program
      run: |
        echo "=== Running ${{ matrix.compiler.name }} build ==="
        ./build/${{ matrix.compiler.name | lower }}/cmake_project_template
        echo "=== Exit code: $? ==="
    
    - name: Upload build artifacts (optional)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.compiler.name | lower }}-binary
        path: build/${{ matrix.compiler.name | lower }}/cmake_project_template
        retention-days: 7