name: Setup vcpkg
description: 'Clones, bootstraps, and caches vcpkg for dependency management'
inputs:
  os:
    description: 'The operating system of the runner (e.g., windows, macos, linux)'
    required: true
runs:
  using: composite
  steps:
    - name: Clone vcpkg (non-Linux)
      if: ${{ inputs.os != 'linux' }}
      shell: bash
      run: |
        git clone https://github.com/Microsoft/vcpkg.git "$HOME/vcpkg"
        "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
        echo "$HOME/vcpkg" >> "$GITHUB_PATH"

    - name: Cache vcpkg
      uses: actions/cache@v4
      with:
        path: |
          ~/vcpkg
          !~/vcpkg/.git
        key: vcpkg-${{ inputs.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-${{ inputs.os }}-
