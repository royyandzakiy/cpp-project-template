name: Setup Package Manager
inputs:
  os:
    required: true
runs:
  using: composite
  steps:
    # ── vcpkg ──────────────────────────────────────────────
    - name: Clone vcpkg (non-Linux)
      if: inputs.os != 'linux'
      shell: bash
      run: |
        if [ ! -d "$HOME/vcpkg" ]; then
          git clone https://github.com/Microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
        fi
        echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"
        echo "$HOME/vcpkg" >> "$GITHUB_PATH"

    - name: Cache vcpkg
      if: inputs.os != 'linux'
      uses: actions/cache@v4
      with:
        path: |
          ${{ runner.home }}/vcpkg
          !${{ runner.home }}/vcpkg/.git
        key: vcpkg-${{ inputs.os }}-${{ hashFiles('vcpkg.json') }}
        restore-keys: vcpkg-${{ inputs.os }}-

    # ── Conan ──────────────────────────────────────────────
    - name: Conan profile detect (Linux)
      if: inputs.os == 'linux'
      shell: bash
      run: conan profile detect --force

    - name: Conan profile detect (macOS)
      if: inputs.os == 'macos'
      shell: bash
      run: conan profile detect --force

    - name: Cache Conan (Linux)
      if: inputs.os == 'linux'
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ hashFiles('conanfile.txt') }}
        restore-keys: conan-

    - name: Cache Conan (macOS)
      if: inputs.os == 'macos'
      uses: actions/cache@v4
      with:
        path: ~/.conan2
        key: conan-${{ hashFiles('conanfile.txt') }}
        restore-keys: conan-
